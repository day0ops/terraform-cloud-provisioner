name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fmt-check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform format check
        run: terraform fmt -check -recursive

  discover-environments:
    name: Discover Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.list.outputs.environments }}
    steps:
      - uses: actions/checkout@v6

      - name: List environments
        id: list
        shell: bash
        run: |
          set -euo pipefail
          envs=$(ls -d environments/*/ \
            | xargs -I{} basename {} \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          if [ "$envs" = "[]" ] || [ -z "$envs" ]; then
            echo "ERROR: no environments found in environments/" >&2
            exit 1
          fi
          echo "environments=$envs" >> "$GITHUB_OUTPUT"

  validate:
    name: Terraform Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: discover-environments
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.discover-environments.outputs.environments) }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform validate
        run: terraform validate
        working-directory: environments/${{ matrix.environment }}

  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-latest
    needs: [fmt-check, validate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        shell: bash
        run: |
          set -euo pipefail
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current tag: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "ERROR: unknown bump_type '$BUMP_TYPE'" >&2
              exit 1
              ;;
          esac
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

      - name: Push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --generate-notes \
            --title "Release ${{ steps.version.outputs.new_tag }}"
        env:
          GH_TOKEN: ${{ github.token }}
