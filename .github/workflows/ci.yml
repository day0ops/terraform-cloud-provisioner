name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform format check
        run: terraform fmt -check -recursive

  discover-environments:
    name: Discover Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.list.outputs.environments }}
    steps:
      - uses: actions/checkout@v6

      - name: List environments
        id: list
        shell: bash
        run: |
          set -euo pipefail
          envs=$(ls -d environments/*/ \
            | xargs -I{} basename {} \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          if [ "$envs" = "[]" ] || [ -z "$envs" ]; then
            echo "ERROR: no environments found in environments/" >&2
            exit 1
          fi
          echo "environments=$envs" >> "$GITHUB_OUTPUT"

  validate:
    name: Terraform Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: discover-environments
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.discover-environments.outputs.environments) }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform validate
        run: terraform validate
        working-directory: environments/${{ matrix.environment }}
